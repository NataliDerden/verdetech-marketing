<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вердэ Ингредиенты — Маркетинг</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-page">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">ВИ</div>
            <div>
                <div class="sidebar-title">Вердэ Ингредиенты</div>
                <div class="sidebar-subtitle">Email-маркетинг</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Инструменты</div>
            {% for tool_id, tool in tools.items() %}
            <button class="nav-item {% if loop.first %}active{% endif %}" onclick="selectTool('{{ tool_id }}', this)">
                <span class="nav-icon">{{ tool.icon }}</span>
                <span>{{ tool.name }}</span>
            </button>
            {% endfor %}
        </nav>

        <div class="sidebar-footer">
            <a href="/logout" class="logout-link">Выйти</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-header">
            <h2 id="tool-title">Написать письмо</h2>
            <p id="tool-desc" class="content-desc">Опишите задачу — AI напишет профессиональное письмо для Вердэ Ингредиенты</p>
        </div>

        <div class="input-area">
            <textarea
                id="user-input"
                placeholder="Введите задачу..."
                rows="4"
            ></textarea>
            <button class="btn-primary" id="generate-btn" onclick="generate()">
                <span id="btn-text">Сгенерировать</span>
                <span id="btn-loader" class="loader" style="display:none"></span>
            </button>
        </div>

        <div id="result-area" class="result-area" style="display:none">
            <div class="result-header">
                <span>Результат</span>
                <button class="btn-copy" onclick="copyResult()">Скопировать</button>
            </div>
            <div id="result-content" class="result-content"></div>
        </div>

        <div id="error-area" class="error-area" style="display:none">
            <span id="error-text"></span>
        </div>
    </main>

    <script>
        const tools = {{ tools_ui | tojson }};
        let currentTool = '{{ tools.keys() | list | first }}';

        const toolDescriptions = {
            'email_writer': 'Опишите задачу — AI напишет профессиональное письмо для Вердэ Ингредиенты',
            'campaign_planner': 'Опишите цель кампании — получите готовый план с датами и темами',
            'subject_lines': 'Опишите письмо — получите 10 вариантов темы для A/B тестирования',
            'segment_strategy': 'Опишите вашу базу — получите стратегию сегментации',
            'metrics_advisor': 'Вставьте показатели рассылки — получите анализ и рекомендации',
            'welcome_series': 'Опишите ситуацию — получите готовую серию из 4 писем',
        };

        function selectTool(toolId, btn) {
            currentTool = toolId;

            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const tool = tools[toolId];
            document.getElementById('tool-title').textContent = tool.name;
            document.getElementById('tool-desc').textContent = toolDescriptions[toolId] || '';
            document.getElementById('user-input').placeholder = tool.placeholder;
            document.getElementById('user-input').value = '';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('error-area').style.display = 'none';
        }

        async function generate() {
            const input = document.getElementById('user-input').value.trim();
            if (!input) {
                showError('Пожалуйста, введите задачу');
                return;
            }

            setLoading(true);
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('error-area').style.display = 'none';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tool: currentTool, input }),
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                } else {
                    showResult(data.result);
                }
            } catch (e) {
                showError('Ошибка сети. Проверьте подключение и попробуйте снова.');
            } finally {
                setLoading(false);
            }
        }

        function showResult(text) {
            const formatted = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^\d+\. (.*$)/gm, '<div class="list-item"><span class="list-num">•</span> $1</div>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            document.getElementById('result-content').innerHTML = '<p>' + formatted + '</p>';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
        }

        function showError(msg) {
            document.getElementById('error-text').textContent = msg;
            document.getElementById('error-area').style.display = 'block';
        }

        function setLoading(loading) {
            document.getElementById('generate-btn').disabled = loading;
            document.getElementById('btn-text').style.display = loading ? 'none' : 'inline';
            document.getElementById('btn-loader').style.display = loading ? 'inline-block' : 'none';
        }

        function copyResult() {
            const text = document.getElementById('result-content').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.textContent = 'Скопировано!';
                setTimeout(() => btn.textContent = 'Скопировать', 2000);
            });
        }

        document.getElementById('user-input').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') generate();
        });
    </script>
</body>
</html>
