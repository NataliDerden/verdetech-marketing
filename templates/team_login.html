<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verde Tech — Вход для команды</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e4e4e7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #1a1b23; border: 1px solid #27272a; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; text-align: center; }
.login-box h1 { color: #22c55e; font-size: 22px; margin-bottom: 8px; }
.login-box p { color: #71717a; font-size: 14px; margin-bottom: 24px; }
.login-box input { width: 100%; background: #0f1117; border: 1px solid #3f3f46; border-radius: 10px; padding: 12px 16px; color: #e4e4e7; font-size: 15px; outline: none; margin-bottom: 16px; }
.login-box input:focus { border-color: #22c55e; }
.login-box button { width: 100%; background: #22c55e; color: #000; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.login-box button:hover { background: #16a34a; }
.error { color: #ef4444; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<form class="login-box" method="POST">
    <h1>Verde Tech</h1>
    <p>План команды — SEO и Директ</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <input type="password" name="password" placeholder="Пароль" autofocus>
    <button type="submit">Войти</button>
</form>
</body>
</html>
